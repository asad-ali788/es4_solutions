<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  
  <!-- Blue → Purple Gradient -->
  <defs>
    <linearGradient id="gradBluePurple" x1="0" y1="0" x2="1" y2="1">
      <!-- Top-left Blue -->
      <stop offset="0%" stop-color="#3B82F6"/>
      <!-- Bottom-right Purple -->
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Circle Background -->
  <circle cx="64" cy="64" r="64" fill="url(#gradBluePurple)" />

  <!-- Sparkle Star -->
  <path
    d="M64 28 
       L70 56 
       L98 62 
       L70 68 
       L64 96 
       L58 68 
       L30 62 
       L58 56 Z"
    fill="none"
    stroke="white"
    stroke-width="6"
    stroke-linejoin="round"
    stroke-linecap="round"
  />

  <!-- Plus Symbol -->
  <g stroke="white" stroke-width="6" stroke-linecap="round">
    <line x1="92" y1="36" x2="92" y2="48"/>
    <line x1="86" y1="42" x2="98" y2="42"/>
  </g>

  <!-- Small Circle -->
  <circle cx="34" cy="86" r="6" fill="none" stroke="white" stroke-width="6"/>

</svg>